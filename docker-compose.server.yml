services:
  db:
    image: postgres:16.4
    restart: unless-stopped
    volumes:
      - ./data/db:/var/lib/postgresql/data
    env_file: ./.env.prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 5

  server:
    image: ghcr.io/codersforcauses/bloom-booking-system-prod-server:latest
    container_name: bloom-booking-system-prod-server
    restart: unless-stopped
    env_file: ./.env.prod
    ports:
      - 8081:8081
    entrypoint: /entrypoint.sh
    volumes:
      - ./opt/accesslogs/:/var/log/accesslogs/
      - ./opt/static_files:/opt/static_files
      - ./opt/media:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=api.settings
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: nginx:stable-alpine3.21
    container_name: bloom-booking-system-prod-nginx
    restart: unless-stopped
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./docker/nginx/server.conf:/etc/nginx/nginx.conf
      - ./opt/static_files:/app/static_files
      - ./opt/media:/app/media
    depends_on:
      - server

  watchtower:
    image: containrrr/watchtower:latest
    container_name: bloom-booking-system-prod-watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30
